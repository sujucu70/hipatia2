<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hipatia · Entelgy</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #051C2C;
      color: #FFFFFF;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box { max-width: 480px; padding: 0 24px; }
    .logo { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; }
    .logo .dot { color: #B5622A; }
    .status {
      margin-top: 28px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .line { margin-top: 14px; font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Entelgy<span class="dot">·</span></div>
    <div class="status">Hipatia · en construcción</div>
    <div class="line">Pipeline operativo. Portal del área de Modernización en preparación.</div>
  </div>
</body>
</html>
